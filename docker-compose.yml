services:
  web:
    container_name: classifieds-web
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/public/uploads
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: classifieds-postgres
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Daily blog generation — alpine cron container hits the protected endpoint
  # at 04:00 UTC. Endpoint is idempotent per UTC day, so duplicate hits are safe.
  cron:
    image: alpine:3.19
    container_name: classifieds-cron
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - web
    # Crontab is written at startup with the secret already substituted in,
    # because crond doesn't inherit env vars at job-execution time.
    # `$$` escapes docker-compose interpolation so $BLOG_CRON_SECRET expands
    # at container startup (where env_file is loaded), not at compose-time.
    command:
      - sh
      - -c
      - |
        apk add --no-cache curl tzdata >/dev/null
        echo "0 4 * * * curl -fsS 'http://web:3000/api/cron/generate-blog-article?secret=$$BLOG_CRON_SECRET' >> /var/log/blog-cron.log 2>&1" > /etc/crontabs/root
        touch /var/log/blog-cron.log
        crond -f -L /var/log/blog-cron.log

volumes:
  pgdata:
  uploads: